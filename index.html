<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BETP Project Locations – Botswana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .topbar {
      width: 100%;
      max-width: 740px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .topbar-title h1 {
      font-size: 26px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.04em;
    }
    .topbar-title p {
      font-size: 13px;
      color: #777;
      margin-top: 3px;
    }
    .coat-of-arms {
      height: 80px;
      width: auto;
      object-fit: contain;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e4e4e4;
      padding: 1.25rem;
      width: 100%;
      max-width: 740px;
    }
    #map {
      width: 100%;
      height: 480px;
      border-radius: 10px;
      border: 1px solid #e4e4e4;
    }
    .hint { text-align: center; font-size: 12px; color: #aaa; margin-top: 0.6rem; }
    .legend {
      margin-top: 1.1rem;
      border-top: 1px solid #f0f0f0;
      padding-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .legend-item { display: flex; align-items: flex-start; gap: 10px; }
    .legend-pin {
      width: 22px; height: 22px; border-radius: 50%;
      background: #185FA5; color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .legend-text strong { display: block; font-size: 12px; font-weight: 600; color: #222; }
    .legend-text span { color: #888; font-size: 11px; }
    footer { margin-top: 1.5rem; font-size: 11px; color: #bbb; text-align: center; }
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
      border: 1px solid #e4e4e4;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: 220px !important; }
    .leaflet-popup-tip-container { display: none; }
    .pi { padding: 14px 16px; }
    .badge {
      display: inline-block;
      background: #E6F1FB; color: #0C447C;
      font-size: 10px; font-weight: 600;
      border-radius: 4px; padding: 2px 8px;
      margin-bottom: 7px;
    }
    .pname { font-size: 13px; font-weight: 600; color: #111; margin: 0 0 8px; }
    .prow { display: flex; gap: 6px; font-size: 11px; margin: 3px 0; line-height: 1.4; }
    .plabel { min-width: 52px; color: #bbb; }
    .pval { color: #555; }
    .pdesc {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #f0f0f0;
      font-size: 11px; color: #666; line-height: 1.55;
    }
  </style>
</head>

      }
    ];

    function makeIcon(n) {
      return L.divIcon({
        className: '',
        html: `<div style="width:32px;height:32px;border-radius:50%;background:#185FA5;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.25);font-family:sans-serif">${n}</div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16],
        popupAnchor: [0, -20]
      });
    }

    function popupHTML(p) {
      return `<div class="pi">
        <span class="badge">${p.epp}</span>
        <p class="pname">${p.name}</p>
        <div class="prow"><span class="plabel">Location</span><span class="pval">${p.location}</span></div>
        <div class="prow"><span class="plabel">Sector</span><span class="pval">${p.sector}</span></div>
        <div class="pdesc">${p.desc}</div>
      </div>`;
    }

    const map = L.map('map', { center: [-21.5, 24.0], zoom: 6, scrollWheelZoom: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 18
    }).addTo(map);

    projects.forEach(p => {
      L.marker([p.lat, p.lng], { icon: makeIcon(p.no) })
        .addTo(map)
        .bindPopup(popupHTML(p), { maxWidth: 260, minWidth: 220 });
    });
